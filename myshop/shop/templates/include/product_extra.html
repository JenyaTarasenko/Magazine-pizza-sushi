{% load static %}
<div class="w-[270px] bg-[#FE9C1C]/40 rounded-[80px] overflow-hidden flex flex-col items-center text-center p-4">

    <!-- 🖼 Картинка -->
    <img src="{{ product_extra.image.url }}" alt="Пицца доставка" class="w-20 h-20 object-contain" loading="lazy">

    <!-- 📄 Текст -->
    <h3 class="text-2xl font-bold text-[#64352A] mt-2 uppercase">{{ product_extra.name }}</h3>
    <p class="text-sm text-[#64352A]/80 mt-2 line-clamp-2">
        {{ product_extra.weight }} грамм
    </p>
    <p class="text-xl font-bold text-[#64352A] mt-2 line-clamp-2 mb-10">
        {{ product_extra.price|floatformat:0 }} <span class="text-sm font-normal">грн</span>
    </p>


    <form action="{% url 'cart:cart_add' product_extra.id %}" method="post" class="inline-block">
        {% csrf_token %}
        <input type="hidden" name="quantity" value="1">
        <input type="hidden" name="override" value="False">
        <button type="submit" class="px-6 py-2 rounded-full 
                        bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 
                        text-white font-semibold flex items-center gap-2
                        hover:scale-105 active:scale-95 transition">
            <img src="{% static 'image/card.svg' %}" class="w-5 h-5">
        </button>
    </form>



</div>
