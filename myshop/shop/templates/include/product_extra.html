{% load static %}
<div class="w-[300px] bg-[#FE9C1C]/60 rounded-[80px] overflow-hidden flex flex-col items-center text-center p-4">

    <!-- 🖼 Картинка -->
    <img src="{{ product_extra.image.url }}" alt="Пицца доставка" class="w-20 h-20 object-cover" loading="lazy">

    <!-- 📄 Текст -->
    <h3 class="text-2xl font-bold text-[#64352A] mt-4">{{ product_extra.name }}</h3>
    <p class="text-sm text-[#64352A] mt-2 line-clamp-2">
        {{ product_extra.weight }} г
    </p>
    <p class="text-sm text-[#64352A] mt-2 line-clamp-2">
        {{ product_extra.price|floatformat:0 }} грн
    </p>


    <form action="{% url 'cart:cart_add' product_extra.id %}" method="post" class="inline-block">
        {% csrf_token %}
        <input type="hidden" name="quantity" value="1">
        <input type="hidden" name="override" value="False">
        <button type="submit" class="px-6 py-2 rounded-full 
                        bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 
                        text-white font-semibold flex items-center gap-2
                        hover:scale-105 active:scale-95 transition">
            <img src="{% static 'image/card.svg' %}" class="w-5 h-5">
        </button>
    </form>



</div>
