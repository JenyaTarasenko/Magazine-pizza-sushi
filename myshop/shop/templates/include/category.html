{% load static %}
<div class="flex flex-col justify-center items-center">
    <img src="{{ category.image.url }}" class="w-40 h-40 mb-4 object-contain" alt="{{ category.name }}" loading="lazy">
    <h3 class="text-lg font-normal mb-2 font-montserrat text-[#64352A] uppercase">{{ category.name }}</h2>
        <a href="{{ category.get_absolute_url }}" class="inline-block mt-8 px-6 py-3 border-2 border-[#64352A] rounded-full 
                            hover:bg-[#64352A] hover:text-white transition font-montserrat text-[#64352A]">
            Смотреть меню
        </a>
</div>
